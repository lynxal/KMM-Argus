name: Publish to Maven Central

permissions:
  contents: write

on:
  workflow_dispatch:

  release:
    types: [released]

jobs:
  build-release:
    uses: ./.github/workflows/buildLibrary.yml

  publish:
    needs: build-release
    timeout-minutes: 60
    environment: Release

    strategy:
      fail-fast: true
      matrix:
        include:
          - target: publishAllPublicationsToMavenCentralRepository
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate GradleW
        uses: gradle/wrapper-validation-action@v3

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: zulu

      - name: Publish to Maven
        uses: gradle/gradle-build-action@v3

        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALUSERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALPASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGINMEMORYKEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGINMEMORYKEYID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGINMEMORYKEYPASSWORD }}

        with:
          arguments: ${{ matrix.target }}

      - name: Build argus-ios XCFramework
        if: github.event_name == 'release'
        uses: gradle/gradle-build-action@v3
        with:
          arguments: ":argus-ios:assembleArgus-iosReleaseXCFramework"

      - name: Zip XCFramework + compute SHA-256
        if: github.event_name == 'release'
        id: xcf
        run: |
          set -euo pipefail
          XCF_DIR="argus-ios/build/XCFrameworks/release/argus_ios.xcframework"
          ZIP_PATH="argus_ios.xcframework.zip"
          (cd "$(dirname "$XCF_DIR")" && zip -r "../../../../$ZIP_PATH" "$(basename "$XCF_DIR")")
          CHECKSUM=$(swift package compute-checksum "$ZIP_PATH")
          echo "Checksum (paste into Package.swift binaryTarget): $CHECKSUM"
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload XCFramework to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.xcf.outputs.zip_path }}
          fail_on_unmatched_files: true
          body: |
            ## SPM consumers
            Update `Package.swift` `binaryTarget`:
            - URL: `https://github.com/lynxal/argus/releases/download/${{ github.event.release.tag_name }}/argus_ios.xcframework.zip`
            - Checksum: `${{ steps.xcf.outputs.checksum }}`
          append_body: true
