name: Build Argus Library

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: build
            os: macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: zulu

      - name: Cache Konan
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.versions.toml') }}

      - name: Build with Gradle
        uses: gradle/actions/setup-gradle@v3
        env:
          # iOS smoke test starts a real Ktor/CIO server whose background stdout
          # has tripped the KGP iOS test reporter on shared runners. Skip on CI;
          # AppInfoBuilderTest still exercises the iosTest source set.
          ARGUS_SKIP_IOS_SMOKE: "true"
        with:
          arguments: ${{ matrix.target }}
