name: Verify (JVM/Android)

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: zulu

      - name: Run JVM/Android tests + sample release leak gate
        uses: gradle/actions/setup-gradle@v3
        with:
          arguments: >-
            jvmTest
            testDebugUnitTest
            testReleaseUnitTest
            :argus-okhttp:test
            :argus-urlconnection:test
            :sample:assembleDebug
            :sample:verifyReleaseHasNoArgus
