name: Verify Release APK

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: zulu

      - name: Assemble debug (smoke check)
        uses: gradle/actions/setup-gradle@v3
        with:
          arguments: ":sample:assembleDebug"

      - name: Verify release APK has no Argus classes
        uses: gradle/actions/setup-gradle@v3
        with:
          arguments: ":sample:verifyReleaseHasNoArgus"
