name: Verify (iOS/Mac)

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      skip-smoke:
        description: 'Skip ArgusSmokeTest (escape hatch for KGP iOS reporter flake)'
        required: false
        type: boolean
        default: false

jobs:
  verify-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: zulu

      - name: Cache Konan
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.versions.toml') }}

      - name: Run iOS sim tests + XCFramework + sample iOS release leak gate
        uses: gradle/actions/setup-gradle@v3
        env:
          ARGUS_SKIP_IOS_SMOKE: ${{ inputs.skip-smoke && 'true' || 'false' }}
        with:
          arguments: >-
            iosSimulatorArm64Test
            :argus-ios:assembleArgus-iosReleaseXCFramework
            :sample:verifyIosReleaseHasNoArgus
